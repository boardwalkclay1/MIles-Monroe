<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom Quotes</title>
    <link rel="stylesheet" href="/css/style.css">

    <style>
        body {
            background: url('/public/img/her-writer.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-shadow: 0 0 10px black;
        }

        header {
            background: rgba(0,0,0,0.55);
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
        }

        .content {
            background: rgba(0,0,0,0.55);
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
        }

        .dropdown {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .quote-box {
            padding: 20px;
            background: rgba(0,0,0,0.45);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 20px;
            line-height: 1.5;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.65);
            border: 1px solid gold;
            border-radius: 10px;
            color: gold;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn:hover {
            background: rgba(255,215,0,0.2);
            transform: scale(1.03);
        }
    </style>
</head>

<body>

<header>
    <h1>Wisdom Quotes</h1>
</header>

<section class="content">
    <select id="quoteFilter" class="dropdown"></select>
    <div id="quoteDisplay" class="quote-box">Loading...</div>
    <button id="newQuoteBtn" class="btn">New Quote</button>
</section>

<script src="/js/quotes.js"></script>
</body>
</html>
