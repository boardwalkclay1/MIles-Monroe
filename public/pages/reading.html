<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Mode</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="reading-mode">

<header>
    <h1>Reading Mode</h1>
</header>

<section class="reading-controls">
    <button id="fontUp" class="btn">A+</button>
    <button id="fontDown" class="btn">A-</button>
    <button id="toggleTheme" class="btn">Theme</button>
</section>

<section class="reading-content">
    <p id="readingText">Select a topic from the library to begin reading.</p>
</section>

<script src="/js/reading.js"></script>
</body>
</html>
