<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Mode</title>
    <link rel="stylesheet" href="/css/style.css">

    <style>
        body.reading-mode {
            background: url('/img/her-reader.jpg') no-repeat center center fixed;
            background-size: cover;
            color: silver;
        }

        header, .reading-controls, .reading-content {
            background: rgba(0, 0, 0, 0.55);
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
        }
    </style>
</head>

<body class="reading-mode">

<header>
    <h1>Reading Mode</h1>
</header>

<section class="reading-controls">
    <button id="fontUp" class="btn">A+</button>
    <button id="fontDown" class="btn">A-</button>
    <button id="toggleTheme" class="btn">Theme</button>
</section>

<section class="reading-content">
    <p id="readingText">Select a topic from the library to begin reading.</p>
</section>

<script src="/js/reading.js"></script>
</body>
</html>
