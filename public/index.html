<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/img/clays-gift.jpg">

    <!-- Social Preview -->
    <meta property="og:title" content="Jackie's Wisdom App">
    <meta property="og:description" content="Created for the most beautiful woman I've ever laid eyes on — a world of purpose, wisdom, and Kingdom insight.">
    <meta property="og:image" content="/img/clays-gift.jpg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://miles-monroe.pages.dev/">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Jackie's Wisdom App">
    <meta name="twitter:description" content="A custom-built library of purpose and Kingdom wisdom — made for the most beautiful woman I've ever laid eyes on.">
    <meta name="twitter:image" content="/img/clays-gift.jpg">

    <link rel="stylesheet" href="/css/style.css">

    <!-- Medieval Font -->
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Cardo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: url('/img/kingdom.jpg') no-repeat center center fixed;
            background-size: cover;
            color: silver;
            overflow-x: hidden;
            font-family: 'Cardo', serif;
        }

        h1, h2, .subtitle {
            font-family: 'Uncial Antiqua', serif;
            letter-spacing: 2px;
            text-shadow: 0 0 10px black, 0 0 20px #000;
        }

        header, .featured-block, .spotlight, .quick-categories h2, .top-picks h2 {
            background: rgba(0, 0, 0, 0.55);
            padding: 20px;
            border-radius: 12px;
            margin: 20px;
            border: 1px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
        }

        .btn {
            display: block;
            margin: 12px auto;
            width: 80%;
            text-align: center;
            padding: 14px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid gold;
            border-radius: 10px;
            color: gold;
            font-family: 'Uncial Antiqua', serif;
            font-size: 20px;
            text-shadow: 0 0 8px black;
            transition: 0.3s;
        }

        .btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.03);
        }

        .grid .card {
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-family: 'Uncial Antiqua', serif;
            font-size: 22px;
            color: gold;
            text-shadow: 0 0 8px black;
            transition: 0.3s;
        }

        .grid .card:hover {
            background: rgba(255, 215, 0, 0.15);
            transform: scale(1.05);
        }

        /* Silver Snow Animation */
        .snowflake {
            position: fixed;
            top: -10px;
            color: silver;
            font-size: 14px;
            opacity: 0.8;
            pointer-events: none;
            animation: fall linear infinite;
            text-shadow: 0 0 8px white;
        }

        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>

<body>

<!-- Silver Snow Generator -->
<script>
    for (let i = 0; i < 60; i++) {
        let snow = document.createElement("div");
        snow.className = "snowflake";
        snow.innerHTML = "✦";
        snow.style.left = Math.random() * 100 + "vw";
        snow.style.animationDuration = 4 + Math.random() * 6 + "s";
        snow.style.animationDelay = Math.random() * 5 + "s";
        document.body.appendChild(snow);
    }
</script>

<header>
    <h1>The Beautiful Jackie</h1>
    <p class="subtitle">Your Daily Purpose & Wisdom</p>
</header>

<section class="featured-block">
    <h2>Featured Quote</h2>
    <p id="featuredQuote">Loading...</p>
</section>

<section class="home-buttons">
    <a href="/pages/library.html" class="btn">Miles Munroe Library</a>
    <a href="/pages/authors.html" class="btn">Similar Authors</a>
    <a href="/pages/quotes.html" class="btn">Quotes</a>
    <a href="/pages/daily.html" class="btn">Daily Purpose Drop</a>
    <a href="/pages/reading.html" class="btn">Reading Mode</a>
</section>

<section class="spotlight">
    <h2>Jackie's Spotlight</h2>
    <p id="spotlightText">Loading...</p>
</section>

<section class="quick-categories">
    <h2>Explore Topics</h2>
    <div class="grid">
        <div class="card">Purpose</div>
        <div class="card">Leadership</div>
        <div class="card">Kingdom</div>
        <div class="card">Relationships</div>
        <div class="card">Identity</div>
        <div class="card">Vision</div>
    </div>
</section>

<section class="top-picks">
    <h2>Top Picks For You</h2>
    <ul id="topPicksList"></ul>
</section>

<script src="/js/app.js"></script>
</body>
</html>
